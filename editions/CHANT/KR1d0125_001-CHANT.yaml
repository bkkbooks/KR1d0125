body:
  text: 喪服世行要記皇太子穆妃服尚書左丞兼著作郎王逡問左僕射王儉中軍南郡王小祥應待聞喜不穆妃七月二十四日薨聞喜公八月發哀計十一月之限應在六月南郡王為當同取六月則大祥復申一月應用八月非復正月在存親之義若各自為祥廬堊相間玄素雜糅未審當有此疑不儉曰送往有巳復生有節罔極非服制所申祥縞明示終之斷相待之義經記無聞世人多以廬室衰麻不宜有異故相去一二月者或申以俱除此所謂任情徑行未達禮旨昔撰喪記已嘗言之遠還之人自有為而未祭在家之子立何辭以不變禮有除喪而歸者此則經記之遺文不待之明據假使應待則相去彌年亦宜必待乃為衰絰永服以窮生吉蠲長絕於宗廟斯不可矣苟曰非宜則旬月之間亦不容申何者禮有倫序義無徒設今遠則不待近必相須禮例既乖即心無取若疑兄弟同居吉凶舛雜則古有異宮之義設無異宮則遠還之子自應開立別門以終喪事靈筵祭奠隨在家之人再朞而毀所以然者奔喪禮云為位不奠鄭玄云以其精神不存乎此也聞哀不時寔緣在遠乎位不奠益有可安此自有為而然不關嫡庶庶子在家亦不待嫡矣而況儲妃正體王室中軍長嫡之重天朝又行權制進退彌復非疑謂不應相待中軍祥縞之日聞喜致哀而己不受弔慰及至忌辰變除弟亦宜相就寫情而不對客此國之大典宜通關入座丞郎共盡同異然後奏御司徒褚淵等二十人竝同儉議為允請以為永制詔何南齊書禮志
